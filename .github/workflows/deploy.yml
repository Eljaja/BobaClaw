name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

      - name: Format check
        run: cargo fmt --all -- --check

  build-and-push:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write
    outputs:
      bobaclaw_image: ${{ steps.meta.outputs.bobaclaw_image }}
      sandbox_image: ${{ steps.meta.outputs.sandbox_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image names
        id: meta
        run: |
          # Docker/OCI image refs must be lowercase (repo owner/name can be mixed case on GitHub).
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          tag="latest"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
          fi
          base="${REGISTRY}/${owner}/${repo}"
          echo "bobaclaw_image=${base}/bobaclaw:${tag}" >> "$GITHUB_OUTPUT"
          echo "sandbox_image=${base}/sandbox:${tag}" >> "$GITHUB_OUTPUT"
          echo "bobaclaw_cache=${base}/bobaclaw:buildcache" >> "$GITHUB_OUTPUT"
          echo "sandbox_cache=${base}/sandbox:buildcache" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push BobaClaw gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/bobaclaw/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.bobaclaw_image }}
          cache-from: |
            type=registry,ref=${{ steps.meta.outputs.bobaclaw_cache }}
            type=gha,scope=bobaclaw
          cache-to: |
            type=registry,ref=${{ steps.meta.outputs.bobaclaw_cache }},mode=max
            type=gha,scope=bobaclaw,mode=max,ignore-error=true

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/sandbox/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.sandbox_image }}
          cache-from: |
            type=registry,ref=${{ steps.meta.outputs.sandbox_cache }}
            type=gha,scope=sandbox
          cache-to: |
            type=registry,ref=${{ steps.meta.outputs.sandbox_cache }},mode=max
            type=gha,scope=sandbox,mode=max,ignore-error=true

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ${{ vars.SELF_HOSTED_RUNNER_LABEL || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare data directory
        run: mkdir -p "${DEPLOY_PATH:-/opt/bobaclaw}/data"
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

      - name: Deploy gateway + telegram channel
        run: |
          set -eu
          export DEPLOY_PATH="${DEPLOY_PATH:-/opt/bobaclaw}"
          export BOBACLAW_IMAGE="${{ needs.build-and-push.outputs.bobaclaw_image }}"
          export BOBACLAW_SANDBOX_IMAGE="${{ needs.build-and-push.outputs.sandbox_image }}"
          chmod +x ./scripts/docker-prod-deploy.sh
          ./scripts/docker-prod-deploy.sh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
