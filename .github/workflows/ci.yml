name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  # Homelab runner label (deploy.yml). Override via repo variable SELF_HOSTED_RUNNER_LABEL.
  SELF_HOSTED_RUNNER_LABEL: self-hosted

jobs:
  harness-and-rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check repository structure
        run: python3 scripts/check_repo_structure.py

      - name: Scan for obvious secrets
        run: python3 scripts/scan_secrets.py

      - name: Smoke eval contract
        run: make eval-smoke

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace
