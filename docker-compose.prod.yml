# Production stack: BobaClaw gateway + host Docker for sandbox and Obscura MCP.
#
# Setup:
#   mkdir -p /opt/bobaclaw/data
#   edit /opt/bobaclaw/data/config.yaml   # API key, Telegram token, channels, executor
#   make docker-build && make docker-up
#
# Optional docker/.env — image tags / RUST_LOG only (no secrets required).
#
# Update (CI/CD or manual):
#   make docker-pull && make docker-up

services:
  bobaclaw:
    image: ${BOBACLAW_IMAGE:-bobaclaw/bobaclaw:latest}
    build:
      context: .
      dockerfile: docker/bobaclaw/Dockerfile
    container_name: bobaclaw-gateway
    restart: unless-stopped
    environment:
      BOBACLAW_HOME: /data
      # Host path for /data bind mount — required so sandbox containers mount real workspace/runs.
      BOBACLAW_HOST_HOME: ${BOBACLAW_DATA_DIR:-/opt/bobaclaw/data}
      BOBACLAW_SANDBOX_IMAGE: ${BOBACLAW_SANDBOX_IMAGE:-bobaclaw/sandbox:latest}
      OBSCURA_MCP_IMAGE: ${OBSCURA_MCP_IMAGE:-h4ckf0r0day/obscura}
      BOBACLAW_PULL_IMAGES: ${BOBACLAW_PULL_IMAGES:-1}
      RUST_LOG: ${RUST_LOG:-bobaclaw=info}
    volumes:
      - ${BOBACLAW_DATA_DIR:-/opt/bobaclaw/data}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${BOBACLAW_GATEWAY_PORT:-18790}:18790"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18790/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
