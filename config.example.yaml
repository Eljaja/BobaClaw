# Copy to ~/.bobaclaw/config.yaml and adjust.

provider:
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  model: gpt-4o-mini

default_agent_group: home

agent:
  # Max LLM↔tool loop steps per user message (each tool batch = one step).
  max_tool_iterations: 60
  # Parent-mode nudges when the model replies without tool calls (tools are offered).
  max_action_retries: 2
  # Retries when the model ends the loop without user-visible text.
  max_empty_response_retries: 3

context:
  compression_enabled: true
  context_window_tokens: 128000
  reserve_tokens: 16000
  keep_recent_messages: 8
  # Proactive compaction before each LLM call when estimate exceeds this fraction of the window.
  pre_call_compact_ratio: 0.8

executor:
  backend: bubblewrap   # bubblewrap | docker
  network: true
  sandbox_packages: true   # bubblewrap only; Docker installs into the container FS
  docker:
    # Build first: ./scripts/build-sandbox-image.sh  (Ubuntu + Python, amd64/arm64)
    image: bobaclaw/sandbox:latest
    container_name: bobaclaw-sandbox

gateway:
  bind: 127.0.0.1
  port: 18790
  # Parallel agent turns for different Telegram DMs / sessions (same chat stays serialized).
  max_parallel_turns: 4

channels:
  telegram:
    enabled: true
    bot_token_env: TELEGRAM_BOT_TOKEN
    polling: true
    # DM: pairing | allowlist | open
    dm_policy: pairing
    allow_from: []
    # Groups: allowlist | open | disabled
    group_policy: allowlist
    allowed_groups: []
    group_require_mention: true
    stream_edit_interval_ms: 800
    # html = LLM markdown → Telegram HTML (https://gramio.dev/formatting); plain = no parse_mode
    format: html
    # Bot API proxy (if api.telegram.org is blocked). HTTP or SOCKS5.
    # Example LAN proxy: HTTP :8080, SOCKS :1080 (do not use HTTP on a SOCKS port).
    # proxy_url: http://192.168.1.100:8080
    # proxy_url: socks5://192.168.1.100:1080
    proxy_url: ""
    proxy_env: TELEGRAM_PROXY

scheduler:
  enabled: true
  embedded: false   # true = also run inside `bobaclaw chat`; gateway/telegram always in-process
  tick_secs: 5      # max poll interval; one-shot tasks wake the scheduler sooner

# Recurring jobs (cron syntax, 5 fields: min hour dom month dow)
cron:
  jobs: []
  # - id: monday-briefing
  #   cron: "0 9 * * 1"
  #   agent_group: home
  #   prompt: "Weekly summary for the user"
  #   deliver:
  #     channel: telegram
  #     peer: "123456789"

# External MCP servers. Tools appear as mcp_<server>_<tool> in the agent.
# Transport: stdio (command + args) or HTTP (url — long-lived server).
mcp_servers:
  # Obscura headless browser (Docker stdio — install: make install-obscura-mcp).
  # BobaClaw reuses one named container (bobaclaw-mcp-obscura) per process.
  # obscura:
  #   command: docker
  #   args:
  #     - run
  #     - --rm
  #     - -i
  #     - --platform
  #     - linux/amd64          # omit on native amd64 Linux
  #     - h4ckf0r0day/obscura
  #     - mcp
  #   enabled: true
  #   timeout_secs: 180
  #   connect_timeout_secs: 90
  #   tools_allowlist: []     # empty = all browser_* tools
  #   tools_denylist: []

  # Obscura HTTP (native binary on host only; not Docker HTTP today):
  # obscura:
  #   url: http://127.0.0.1:3000/mcp
  #   enabled: true
  #   timeout_secs: 180
  #   connect_timeout_secs: 60

  # Parallel Search MCP (Streamable HTTP). Free without auth; optional auth_env for higher limits.
  # In Docker, use proxy_url when the host IP is blocked (e.g. Cloudflare) and an outbound proxy works.
  # parallel_search:
  #   url: https://search.parallel.ai/mcp
  #   proxy_url: http://192.168.1.100:11882
  #   auth_env: PARALLEL_API_KEY
  #   enabled: true
  #   timeout_secs: 120
  #   connect_timeout_secs: 60

  # filesystem (stdio subprocess):
  #   command: npx
  #   args:
  #     - -y
  #     - "@modelcontextprotocol/server-filesystem"
  #     - /tmp
  #   env: {}
  #   enabled: true
  #   timeout_secs: 120
  #   connect_timeout_secs: 60
  #   tools_allowlist: []
  #   tools_denylist: []

# Subagent delegation (native in-process child loops by default).
subagents:
  enabled: true
  max_depth: 1
  max_concurrent: 2
  max_tool_iterations: 20
  child_timeout_seconds: 600
  result_max_chars: 12000
  persist_child_sessions: false
  default_backend: native
  spawn:
    notify_on_complete: true
    wake_parent_on_complete: true
    wake_on_failure: false
    wake_max_per_hour_per_session: 10
    result_persist_chars: 12000
    job_retention_days: 30
  # model: gpt-4o-mini          # optional cheaper model for native children
  # presets:
  #   researcher:
  #     model: gpt-4o-mini
  #     system_extra: "Prefer read-only exploration."
  #     tools_allowlist: ["exec", "mcp_*"]
  #     skills: []
  backends:
    claude_code:
      enabled: false
      command: claude
      api_key_env: ANTHROPIC_API_KEY
      max_turns: 30
      timeout_secs: 900
    codex:
      enabled: false
      command: codex
      api_key_env: CODEX_API_KEY
      sandbox: workspace-write
      timeout_secs: 900
    cursor:
      enabled: false
      wrapper_command: python3
      api_key_env: CURSOR_API_KEY
      model: composer-2.5
      timeout_secs: 900

routing:
  rules:
    - match:
        channel: telegram
        peer: "*"
      agent_group: home
