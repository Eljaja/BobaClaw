  # filesystem (stdio subprocess):
  #   command: npx
  #   args:
  #     - -y
  #     - "@modelcontextprotocol/server-filesystem"
  #     - /tmp
  #   env: {}
  #   enabled: true
  #   timeout_secs: 120
  #   connect_timeout_secs: 60
  #   tools_allowlist: []
  #   tools_denylist: []

routing:
  rules:
    - match:
        channel: telegram
        peer: "*"
      agent_group: home
